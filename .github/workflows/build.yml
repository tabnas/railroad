name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Use LF line endings
      run: git config --global core.autocrlf false
    - uses: actions/checkout@v4
      with:
        path: railroad
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Clone tabnas dependencies
      shell: bash
      run: |
        set -e
        for dep in parser debug json abnf; do
          git clone --depth 1 "https://github.com/tabnas/$dep.git" "$dep"
        done
    - name: Build (dependencies, then this repo)
      shell: bash
      run: |
        set -e
        for pkg in parser debug json abnf railroad; do
          ( cd "$pkg/ts" && npm i && npm run build --if-present )
        done
    - name: Test
      shell: bash
      working-directory: railroad/ts
      run: npm test

  build-go:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        path: railroad
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Clone tabnas dependencies
      shell: bash
      run: |
        set -e
        for dep in parser json; do
          git clone --depth 1 "https://github.com/tabnas/$dep.git" "$dep"
        done
    - name: Set up go workspace
      shell: bash
      run: |
        set -e
        go work init
        go work use ./parser/go ./json/go ./railroad/go
    - name: Build
      working-directory: railroad/go
      run: go build ./...
    - name: Test
      working-directory: railroad/go
      run: go test -v ./...
